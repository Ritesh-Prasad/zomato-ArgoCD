apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-deploy
  labels:
    app: zomato
spec:
  replicas: 4
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: cont1
        image: riteshprasad07/zomato-project:latest
        ports:
        - containerPort: 31111  

---
apiVersion: v1
kind: Service
metadata:
  name: service1
spec:
  type: LoadBalancer
  selector:
    app: zomato
  ports:
  - port: 80        
    targetPort: 31111 
    protocol: TCP
